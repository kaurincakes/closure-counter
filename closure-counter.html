<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#1a1410">
<title>not my problem anymore</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;1,400&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #1a1410;
    --bg2: #221c15;
    --gold: #c8954a;
    --gold-light: #e8b96a;
    --gold-dim: #7a5a2f;
    --gold-faint: #3d2e18;
    --text: #e8dcc8;
    --text-muted: #8a7860;
    --text-faint: #4a3f30;
    --cream: #f0e6d0;
  }

  html, body {
    height: 100%;
    min-height: 100dvh;
    background: var(--bg);
    color: var(--text);
    font-family: 'Lora', Georgia, serif;
    -webkit-tap-highlight-color: transparent;
    overscroll-behavior: none;
  }

  .page {
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2.5rem 1.5rem 5rem;
    position: relative;
  }

  .glow {
    position: fixed;
    top: 30%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 400px;
    height: 400px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(200,149,74,0.06) 0%, transparent 70%);
    pointer-events: none;
    transition: opacity 0.6s ease;
  }

  .glow.pulse {
    animation: glowpulse 0.6s ease-out forwards;
  }

  @keyframes glowpulse {
    0% { background: radial-gradient(circle, rgba(200,149,74,0.06) 0%, transparent 70%); }
    40% { background: radial-gradient(circle, rgba(200,149,74,0.18) 0%, transparent 70%); }
    100% { background: radial-gradient(circle, rgba(200,149,74,0.06) 0%, transparent 70%); }
  }

  .date {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    font-weight: 300;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--text-faint);
    margin-bottom: 3rem;
  }

  .number-area {
    text-align: center;
    margin-bottom: 0.5rem;
    position: relative;
  }

  .big-num {
    font-family: 'Lora', serif;
    font-weight: 400;
    font-size: clamp(110px, 30vw, 172px);
    line-height: 1;
    color: var(--gold-light);
    letter-spacing: -0.03em;
    user-select: none;
    transition: transform 0.12s cubic-bezier(0.34, 1.56, 0.64, 1), color 0.2s ease;
    text-shadow: 0 0 60px rgba(200,149,74,0.15);
  }

  .big-num.pop {
    transform: scale(1.07);
    color: var(--cream);
    text-shadow: 0 0 80px rgba(232,185,106,0.4);
  }

  .unit {
    font-family: 'Lora', serif;
    font-style: italic;
    font-size: 14px;
    font-weight: 400;
    color: var(--text-muted);
    letter-spacing: 0.02em;
    margin-bottom: 3rem;
  }

  .orbs {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
    width: min(320px, 100%);
    min-height: 12px;
    margin-bottom: 3rem;
  }

  .orb {
    width: 9px;
    height: 9px;
    border-radius: 50%;
    background: var(--gold);
    opacity: 0;
    transform: scale(0);
    transition: opacity 0.3s ease, transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
    box-shadow: 0 0 6px rgba(200,149,74,0.4);
  }

  .orb.show { opacity: 1; transform: scale(1); }
  .orb.dim {
    background: var(--gold-dim);
    opacity: 0.35;
    transform: scale(0.65);
    box-shadow: none;
  }

  .release-btn {
    display: block;
    width: min(300px, 100%);
    padding: 20px 24px;
    font-family: 'Lora', serif;
    font-size: 15px;
    font-style: italic;
    font-weight: 400;
    letter-spacing: 0.03em;
    background: var(--gold-faint);
    color: var(--gold-light);
    border: 1px solid var(--gold-dim);
    border-radius: 10px;
    cursor: pointer;
    transition: transform 0.08s ease, background 0.15s ease, border-color 0.15s ease, color 0.15s ease;
    margin-bottom: 1.5rem;
  }

  .release-btn:active, .release-btn.pressed {
    transform: scale(0.96);
    background: #4a3318;
    border-color: var(--gold);
    color: var(--cream);
  }

  .controls {
    display: flex;
    justify-content: space-between;
    width: min(300px, 100%);
    margin-bottom: 2.5rem;
  }

  .ghost {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    font-weight: 300;
    letter-spacing: 0.05em;
    color: var(--text-faint);
    background: none;
    border: none;
    cursor: pointer;
    padding: 6px 0;
    transition: color 0.15s;
  }

  .ghost:hover { color: var(--text-muted); }
  .ghost:disabled { opacity: 0.2; cursor: default; }
  .ghost.undo { text-decoration: underline; text-underline-offset: 3px; }

  .message {
    font-family: 'Lora', serif;
    font-style: italic;
    font-size: 13px;
    color: var(--text-muted);
    text-align: center;
    min-height: 20px;
    letter-spacing: 0.01em;
    transition: opacity 0.4s ease;
  }

  .message .shine { color: var(--gold-light); font-style: normal; }

  .shortcut-hint {
    position: fixed;
    bottom: 1.25rem;
    left: 50%;
    transform: translateX(-50%);
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    font-weight: 300;
    letter-spacing: 0.12em;
    color: var(--text-faint);
    white-space: nowrap;
    pointer-events: none;
    text-transform: uppercase;
  }

  @keyframes fadeup {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .message.show {
    animation: fadeup 0.4s ease forwards;
  }
</style>
</head>
<body>
<div class="glow" id="glow"></div>
<div class="page">
  <div class="date" id="date-label"></div>

  <div class="number-area">
    <div class="big-num" id="big-num">0</div>
  </div>
  <div class="unit">things released today</div>

  <div class="orbs" id="orbs"></div>

  <button class="release-btn" id="release-btn">not my problem anymore</button>

  <div class="controls">
    <button class="ghost undo" id="undo-btn" disabled onclick="undo()">undo</button>
    <button class="ghost" onclick="resetDay()">reset day</button>
  </div>

  <div class="message" id="message"></div>
</div>

<div class="shortcut-hint" id="hint">space · enter · → to release &nbsp;·&nbsp; ← to undo</div>

<script>
  const KEY = 'closure_v1';

  const msgs = [
    n => n === 1 ? 'one less thing carrying you.' : null,
    n => n === 2 ? 'two. lighter already.' : null,
    n => n === 3 ? 'three things that no longer belong to you.' : null,
    n => n === 5 ? '<span class="shine">five.</span> that\'s a real unburdening.' : null,
    n => n === 7 ? 'seven things. you\'re moving through it.' : null,
    n => n === 10 ? '<span class="shine">ten.</span> look at that.' : null,
    n => n > 10 && n % 5 === 0 ? `<span class="shine">${n}.</span> still releasing.` : null,
    n => getStreak() >= 3 ? `day ${getStreak()} of letting things go.` : null,
    n => n >= 4 ? `${n} things that are done haunting you.` : null,
    n => n >= 2 ? 'each one is real.' : null,
  ];

  function todayKey() {
    return new Date().toISOString().slice(0, 10);
  }

  function load() {
    try { return JSON.parse(localStorage.getItem(KEY)) || {}; } catch { return {}; }
  }

  function save(d) {
    try { localStorage.setItem(KEY, JSON.stringify(d)); } catch {}
  }

  function getCount() { return load()[todayKey()] || 0; }

  function setCount(n) {
    const d = load();
    d[todayKey()] = Math.max(0, n);
    save(d);
    render();
  }

  function release() {
    setCount(getCount() + 1);
    popAnim();
    glowPulse();
    flashBtn();
  }

  function undo() {
    if (getCount() > 0) setCount(getCount() - 1);
  }

  function resetDay() {
    if (confirm('Reset today back to zero?')) setCount(0);
  }

  function getStreak() {
    const d = load();
    let s = 0;
    const now = new Date();
    for (let i = 0; i <= 365; i++) {
      const dt = new Date(now);
      dt.setDate(dt.getDate() - i);
      const k = dt.toISOString().slice(0, 10);
      if (d[k] && d[k] > 0) s++;
      else break;
    }
    return s;
  }

  function popAnim() {
    const el = document.getElementById('big-num');
    el.classList.remove('pop');
    void el.offsetWidth;
    el.classList.add('pop');
    setTimeout(() => el.classList.remove('pop'), 280);
  }

  function glowPulse() {
    const g = document.getElementById('glow');
    g.classList.remove('pulse');
    void g.offsetWidth;
    g.classList.add('pulse');
    setTimeout(() => g.classList.remove('pulse'), 600);
  }

  function flashBtn() {
    const btn = document.getElementById('release-btn');
    btn.classList.add('pressed');
    setTimeout(() => btn.classList.remove('pressed'), 140);
  }

  function getMessage(n) {
    for (const fn of msgs) {
      const m = fn(n);
      if (m) return m;
    }
    return '';
  }

  function render() {
    const n = getCount();
    document.getElementById('big-num').textContent = n;
    document.getElementById('undo-btn').disabled = n === 0;

    const d = new Date();
    document.getElementById('date-label').textContent =
      d.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });

    const orbsEl = document.getElementById('orbs');
    orbsEl.innerHTML = '';
    const MAX = 40;
    const show = Math.min(n, MAX);
    for (let i = 0; i < show; i++) {
      const orb = document.createElement('div');
      orb.className = 'orb';
      orbsEl.appendChild(orb);
      setTimeout(() => orb.classList.add('show'), i * 20);
    }
    if (n > MAX) {
      for (let i = 0; i < 4; i++) {
        const orb = document.createElement('div');
        orb.className = 'orb dim show';
        orbsEl.appendChild(orb);
      }
    }

    const msgEl = document.getElementById('message');
    const msg = getMessage(n);
    msgEl.innerHTML = msg;
    if (msg) {
      msgEl.classList.remove('show');
      void msgEl.offsetWidth;
      msgEl.classList.add('show');
    }
  }

  document.getElementById('release-btn').addEventListener('click', release);

  document.addEventListener('keydown', e => {
    if (['Space','Enter','ArrowRight','ArrowUp'].includes(e.code)) {
      e.preventDefault();
      release();
    }
    if (['ArrowLeft','ArrowDown','Backspace'].includes(e.code)) {
      e.preventDefault();
      undo();
    }
  });

  window.addEventListener('touchstart', () => {
    const h = document.getElementById('hint');
    if (h) h.style.display = 'none';
  }, { once: true });

  render();
</script>
</body>
</html>
